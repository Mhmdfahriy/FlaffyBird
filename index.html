<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <!-- Meta viewport wajib supaya responsive di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.ico">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="test.css">
  </head>
  <body>  
    <div class="background"></div>
    <img class="bird" src="Bird-2.png" alt="Bird">
    
    <!-- Pesan Awal -->
    <div class="message">Press Enter / Tap to Start</div>
    
    <!-- Skor Realtime saat main -->
    <div class="score">
      <span class="score_title">Score: </span>
      <span class="score_val">0</span>
    </div>

    <!-- Pop-up Game Over (Sembunyikan dulu pakai CSS) -->
    <div class="game-over-screen" id="gameOverScreen">
      <h2>Game Over</h2>
      <div class="result-box">
        <p>Score: <span id="currentScore">0</span></p>
        <p>Best Score: <span id="bestScore">0</span></p>
      </div>
      <button id="restartBtn">Main Lagi</button>
    </div>

    <script src="test.js"></script>
  </body>
</html>
