<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappy Bird Mobile</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>

    <div class="background"></div>
    <img class="bird" src="Bird-2.png" alt="bird">
    
    <div class="score">
        <span class="score_title">Score: </span>
        <span class="score_val">0</span>
    </div>

    <div class="message">
        Tekan Enter atau Tap Layar <br> Untuk Memulai
    </div>

    <!-- UI Game Over -->
    <div id="game-over-screen" class="game-over-card">
        <h1>GAME OVER</h1>
        <p>Skor Kamu</p>
        <div id="final-score">0</div>
        <button id="restart-btn">Main Lagi</button>
    </div>

    <script src="test.js"></script>
</body>
</html>
